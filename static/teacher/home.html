<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>教师工作台 - 教务管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Microsoft YaHei',SimHei,sans-serif;background:#eef1f5;min-height:100vh;display:flex;}
.sidebar{width:220px;background:#1e3a5f;color:#c8d6e5;min-height:100vh;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;}
.sidebar .logo{height:50px;line-height:50px;text-align:center;font-size:17px;font-weight:bold;color:#fff;background:#172d4a;border-bottom:1px solid #2a4a6d;}
.sidebar .logo a{color:#fff;text-decoration:none;}
.sidebar .user-info{padding:14px 16px;font-size:13px;color:#a0b4c8;border-bottom:1px solid #2a4a6d;}
.sidebar .user-info span{display:block;color:#e8e8e8;font-size:14px;margin-top:2px;}
.nav-group{margin-top:6px;}
.nav-group .group-title{padding:10px 16px 4px;font-size:12px;color:#6b8aaa;font-weight:bold;}
.nav-group a{display:block;padding:8px 16px 8px 24px;color:#c8d6e5;text-decoration:none;font-size:13px;transition:all 0.15s;}
.nav-group a:hover{background:#2a4a6d;color:#fff;border-left:3px solid #4a90d9;padding-left:21px;}
.nav-group a.active{background:#2a4a6d;color:#fff;border-left:3px solid #4a90d9;}
.main-area{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.top-bar{height:50px;line-height:50px;background:#fff;padding:0 25px;border-bottom:1px solid #dde1e6;display:flex;justify-content:flex-end;align-items:center;font-size:13px;color:#555;}
.top-bar a{color:#1e3a5f;text-decoration:none;margin-left:15px;font-weight:bold;}
.top-bar a:hover{color:#c0392b;}
.content{padding:25px;flex:1;}
.content .welcome{margin-bottom:22px;}
.content .welcome h2{font-size:20px;color:#1e3a5f;font-weight:normal;}
.content .welcome p{font-size:13px;color:#999;margin-top:4px;}
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.card{background:#fff;border:1px solid #e4e7ec;border-radius:3px;padding:20px 22px;}
.card h3{font-size:15px;color:#1e3a5f;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eef1f5;}
.card .func-list{list-style:none;}
.card .func-list li{margin-bottom:5px;}
.card .func-list a{display:block;padding:7px 10px;color:#445;text-decoration:none;font-size:13px;border-radius:2px;transition:all 0.15s;}
.card .func-list a:hover{background:#eef3f8;color:#1e3a5f;}
.toolbar{margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.toolbar input,.toolbar select{padding:7px 10px;border:1px solid #ccd;border-radius:3px;font-size:13px;}
.toolbar button{padding:7px 16px;background:#1e3a5f;color:#fff;border:none;border-radius:3px;font-size:13px;cursor:pointer;}
.toolbar button:hover{background:#2a5280;}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;}
table.data-table th{background:#f5f6f8;color:#333;padding:10px 8px;border:1px solid #dde1e6;text-align:left;font-weight:bold;}
table.data-table td{padding:8px;border:1px solid #dde1e6;color:#444;}
table.data-table tr:hover{background:#f9fafb;}
.btn-sm{padding:4px 10px;font-size:12px;border:1px solid #ccd;border-radius:2px;cursor:pointer;background:#fff;color:#333;margin:0 2px;}
.btn-sm.danger{color:#c0392b;border-color:#e0b4b4;}
.btn-sm.primary{color:#1e3a5f;border-color:#a0b8d0;}
.section-title{font-size:15px;color:#1e3a5f;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid #eef1f5;}
.form-inline{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.form-inline .field{display:flex;flex-direction:column;}
.form-inline .field label{font-size:12px;color:#666;margin-bottom:3px;}
.form-inline .field input,.form-inline .field select{padding:6px 8px;border:1px solid #ccd;border-radius:3px;font-size:13px;width:130px;}
.info-text{font-size:13px;color:#666;line-height:1.8;}
.stat-box{display:inline-block;background:#fff;border:1px solid #dde1e6;padding:16px 24px;margin:6px;text-align:center;min-width:100px;}
.stat-box .num{font-size:24px;color:#1e3a5f;font-weight:bold;}
.stat-box .lbl{font-size:12px;color:#999;margin-top:4px;}
.footer{text-align:center;color:#aaa;font-size:11px;padding:15px;border-top:1px solid #e4e7ec;}
</style>
</head>
<body>
{{sidebar}}
<div class="main-area">
  <div class="top-bar">
    <a href="/logout">退出登录</a>
  </div>
  <div class="content">

    <div class="welcome">
      <h2>教师工作台</h2>
      <p>欢迎您，{{username}}老师。请选择以下功能进行操作。</p>
    </div>

    <div class="card-grid">

      <div class="card">
        <h3>课程开设与管理</h3>
        <ul class="func-list">
          <li><a href="/teacher/course_add?userid={{userid}}&username={{username}}&role={{role}}">新增课程</a></li>
          <li><a href="/teacher/course_edit?userid={{userid}}&username={{username}}&role={{role}}">修改课程信息</a></li>
          <li><a href="/teacher/course_list?userid={{userid}}&username={{username}}&role={{role}}">查看我的课程</a></li>
        </ul>
      </div>

      <div class="card">
        <h3>选课名单管理</h3>
        <ul class="func-list">
          <li><a href="/teacher/roster?userid={{userid}}&username={{username}}&role={{role}}">查看选课名单</a></li>
        </ul>
      </div>

      <div class="card">
        <h3>成绩录入与管理</h3>
        <ul class="func-list">
          <li><a href="/teacher/grade_input?userid={{userid}}&username={{username}}&role={{role}}">成绩录入</a></li>
          <li><a href="/teacher/grade_edit?userid={{userid}}&username={{username}}&role={{role}}">成绩修改</a></li>
          <li><a href="/teacher/grade_stats?userid={{userid}}&username={{username}}&role={{role}}">成绩统计</a></li>
          <li><a href="/teacher/course_close?userid={{userid}}&username={{username}}&role={{role}}">课程结课</a></li>
        </ul>
      </div>

    </div>

  </div>
  <div class="footer">教务管理系统 v1.0</div>
</div>
</body>
</html>
