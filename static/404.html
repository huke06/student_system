<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>404 - 教务管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Microsoft YaHei',SimHei,sans-serif;background:#eef1f5;min-height:100vh;}
.e404{width:400px;margin:100px auto;text-align:center;background:#fff;border:1px solid #dde1e6;border-radius:4px;padding:40px;}
.e404 .code{font-size:56px;color:#c0392b;font-weight:bold;}
.e404 .msg{font-size:15px;color:#666;margin:12px 0;}
.e404 .hint{font-size:12px;color:#999;}
.e404 a{display:inline-block;margin-top:16px;color:#1e3a5f;text-decoration:none;font-size:13px;}
.footer{text-align:center;color:#999;font-size:12px;padding:20px;}
</style>
</head>
<body>
<div class="e404">
  <div class="code">404</div>
  <div class="msg">页面未找到</div>
  <div class="hint">您访问的页面不存在或已被移除</div>
  <a href="/">返回登录页</a>
</div>
<div class="footer">教务管理系统 v1.0</div>
</body>
</html>
